<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>epic page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f0eb;
      font-family: Arial, Helvetica, sans-serif;
      color: #2c2c2c;
      min-height: 100vh;
      padding: 60px 80px;
    }

    .container {
      display: flex;
      justify-content: space-between;
      max-width: 1100px;
      margin: 0 auto;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .title {
      font-size: 10px;
      font-weight: 200;
      letter-spacing: 1.5px;
      text-transform: lowercase;
    }

    .epic1-link {
      font-size: 12px;
      font-weight: 300;
      color: #2c2c2c;
      text-decoration: none;
      letter-spacing: 0.5px;
      border-bottom: 1px solid transparent;
      transition: border-bottom 0.2s ease;
    }

    .epic1-link:hover {
      border-bottom: 1px solid #2c2c2c;
    }

    .right {
      max-width: 400px;
      text-align: right;
    }

    .aidan-title {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: lowercase;
      margin-bottom: 20px;
    }

    .about {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.8;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="title">epic page</div>
      <a href="epic1.html" class="epicpage-link">1. april 2026</a>
    </div>
    <div class="right">
      <div class="aidan-title">aidan</div>
      <p class="about">you can treat this as an elaborate sequel to the "epic" playlists</p>
    </div>
  </div>
</body>
</html>
